<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านป้าแดงตามสั่ง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Kanit', sans-serif; background-color: #f9fafb; } </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <div class="bg-white p-6 pb-4 rounded-b-3xl shadow-sm sticky top-0 z-50">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-xs text-gray-400">ส่งไปที่</p>
                <h1 class="text-lg font-bold">ร้านป้าแดงตามสั่ง</h1>
            </div>
            <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center">🔔</div>
        </div>
        <!-- Search Bar -->
        <div class="mt-4 bg-gray-100 p-3 rounded-2xl flex items-center">
            <span class="text-gray-400 mx-2">🔍</span>
            <input type="text" placeholder="ค้นหาเมนู..." class="bg-transparent w-full outline-none text-sm">
        </div>
    </div>

    <!-- Banner -->
    <div class="px-4 mt-4">
        <div class="bg-orange-500 rounded-3xl p-6 text-white flex justify-between items-center">
            <div>
                <h2 class="text-xl font-bold">ส่วนลดพิเศษ!</h2>
                <p class="text-sm opacity-80">สั่งครั้งแรก ลดทันที 50%</p>
            </div>
            <div class="text-4xl">🍔</div>
        </div>
    </div>

    <!-- Categories -->
    <div class="px-4 mt-6 flex gap-4 overflow-x-auto pb-2">
        <button onclick="switchTab('food')" class="bg-white px-6 py-2 rounded-full border border-orange-200 font-bold text-orange-600 shadow-sm">อาหาร</button>
        <button onclick="switchTab('drink')" class="bg-white px-6 py-2 rounded-full border border-gray-200 text-gray-600 shadow-sm">เครื่องดื่ม</button>
    </div>

    <!-- Content -->
    <div id="contentFood" class="grid grid-cols-2 gap-4 p-4"></div>
    <div id="contentDrink" class="grid grid-cols-2 gap-4 p-4 hidden"></div>

    <!-- Fixed Bottom Cart Button -->
    <div class="fixed bottom-4 left-4 right-4 z-40">
        <button onclick="toggleCart()" id="btnCheckout" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-xl shadow-orange-200 flex justify-between px-6">
            <span>ดูตะกร้า</span>
            <span id="cartCount">0 รายการ</span>
        </button>
    </div>

    <!-- Modal & Scripts (คงเดิมตามระบบของคุณ) -->
    <!-- ... (โค้ด Modal และ Script ส่วนที่เหลือคงเดิมครับ) ... -->

    <script>
        // รวม logic เดิมไว้ที่นี่ (แนะนำให้คงตัวแปรและ function เดิมของคุณเพื่อความลื่นไหล)
        // เพียงแค่ปรับ UI ของตัวปุ่ม และส่วน Header ให้สวยขึ้นตามด้านบนครับ
    </script>
</body>
</html>
