<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านป้าแดงตามสั่ง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24">

    <div id="nameModal" class="fixed inset-0 bg-white z-[100] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <img src="https://i.pinimg.com/736x/66/ec/2f/66ec2fe662776b01e761681253bc8839.jpg" class="w-32 h-32 rounded-full mx-auto mb-6 object-cover border-4 border-red-600">
            <h1 class="text-2xl font-bold mb-2">ยินดีต้อนรับสู่ร้านป้าแดง</h1>
            <p class="text-gray-500 mb-6">กรุณาระบุชื่อของคุณครับ</p>
            <input type="text" id="customerNameInput" placeholder="กรอกชื่อลูกค้า..." class="w-full p-4 border-2 border-red-200 rounded-2xl text-center text-lg mb-6 bg-white font-bold text-red-600 outline-none focus:border-red-600">
            <button onclick="setName()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg">เริ่มสั่งอาหาร</button>
        </div>
    </div>

    <div class="bg-white p-4 shadow-sm flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="https://i.pinimg.com/736x/66/ec/2f/66ec2fe662776b01e761681253bc8839.jpg" class="w-12 h-12 rounded-full object-cover border-2 border-red-600">
            <div>
                <h1 class="text-lg font-bold text-gray-800">ร้านป้าแดงตามสั่ง</h1>
                <p id="orderStatus" class="text-xs text-red-600 font-bold">ยังไม่ได้ระบุชื่อ</p>
            </div>
        </div>
        <button onclick="changeName()" class="bg-gray-100 text-gray-600 px-3 py-1 rounded-lg text-xs font-bold border">แก้ไข</button>
    </div>

    <div class="flex bg-white mx-4 mt-4 rounded-xl p-1 shadow-sm border border-gray-100">
        <button id="tabFood" onclick="switchTab('food')" class="flex-1 bg-red-600 text-white py-2 rounded-lg font-bold">เมนูอาหาร</button>
        <button id="tabDrink" onclick="switchTab('drink')" class="flex-1 text-gray-600 py-2 rounded-lg">เครื่องดื่ม</button>
    </div>

    <div id="contentFood" class="grid grid-cols-2 gap-4 p-4"></div>
    <div id="contentDrink" class="grid grid-cols-2 gap-4 p-4 hidden"></div>
    
    <!-- Order Modal (เพิ่ม Option) -->
    <div id="orderModal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm">
            <h2 id="modalTitle" class="text-xl font-bold mb-4"></h2>
            
            <div class="space-y-4 mb-6">
                <div>
                    <p class="font-bold text-sm mb-2">ระดับความเผ็ด</p>
                    <div class="flex gap-4 text-sm">
                        <label><input type="radio" name="spicy" value="เผ็ดน้อย" class="mr-1">เผ็ดน้อย</label>
                        <label><input type="radio" name="spicy" value="เผ็ดปกติ" checked class="mr-1">เผ็ดปกติ</label>
                        <label><input type="radio" name="spicy" value="เผ็ดมาก" class="mr-1">เผ็ดมาก</label>
                    </div>
                </div>
                <div>
                    <p class="font-bold text-sm mb-2">พิเศษ (+10 บาท)</p>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <label><input type="checkbox" name="extra" value="ไข่ดาว" class="mr-1">ไข่ดาว</label>
                        <label><input type="checkbox" name="extra" value="ไข่เจียว" class="mr-1">ไข่เจียว</label>
                        <label><input type="checkbox" name="extra" value="ไม่ใส่ผัก" class="mr-1">ไม่ใส่ผัก</label>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-4 mb-6">
                <button onclick="changeQty(-1)" class="w-10 h-10 bg-gray-200 rounded-full font-bold">-</button>
                <span id="qty" class="text-xl font-bold">1</span>
                <button onclick="changeQty(1)" class="w-10 h-10 bg-orange-500 text-white rounded-full font-bold">+</button>
            </div>
            
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-3 bg-gray-200 rounded-2xl">ยกเลิก</button>
                <button onclick="addToCart()" class="flex-1 py-3 bg-orange-500 text-white rounded-2xl font-bold">ยืนยัน</button>
            </div>
        </div>
    </div>

    <div id="cartModal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm max-h-[80vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-4">ตะกร้าของคุณ</h2>
            <div id="cartList" class="space-y-3 mb-4"></div>
            <button onclick="sendOrder()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold">ยืนยันสั่งอาหาร</button>
        </div>
    </div>

    <div class="fixed bottom-0 w-full p-4 bg-white border-t">
        <button onclick="toggleCart()" id="btnCheckout" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg">ดูตะกร้า (0 จาน)</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let cart = [], currentMenu = "", currentPrice = 0, quantity = 1, customerName = "";
        
        const foods = [{ name: "กะเพราหมู", price: 50, img: "https://i.pinimg.com/736x/6b/ae/0d/6bae0d7f752ae472f967e6053aea8fe2.jpg" }, { name: "ข้าวผัดหมู", price: 50, img: "https://i.pinimg.com/736x/f4/19/de/f419de37a2237f3b72a02ac08b147d9e.jpg" }, { name: "ข้าวผัดกุ้ง", price: 60, img: "https://i.pinimg.com/736x/68/d0/88/68d08817aa8f47b1520b8abf7cb458fd.jpg" }, { name: "หมูกระเทียม", price: 50, img: "https://i.pinimg.com/736x/0a/f6/4f/0af64f8926e0fdfcb80bfd8c347b3068.jpg" }, { name: "ต้มยำกุ้ง", price: 80, img: "https://i.pinimg.com/736x/88/dc/57/88dc57a2d53e6d2fa10380cfbebd5c57.jpg" }, { name: "ไข่เจียวหมูสับ", price: 40, img: "https://i.pinimg.com/736x/af/27/e6/af27e6a4929d7edd58a1e31c34570592.jpg" }, { name: "ผัดผักบุ้ง", price: 40, img: "https://i.pinimg.com/736x/22/46/fd/2246fdaac023eb3d32df0726b1e9f1da.jpg" }, { name: "ลาบหมู", price: 60, img: "https://i.pinimg.com/736x/25/df/57/25df57d5126dc44b31906b1647e9e678.jpg" }, { name: "ผัดพริกแกง", price: 50, img: "https://i.pinimg.com/736x/f3/f4/26/f3f426fab2d3cc6c46b2368106462aba.jpg" }, { name: "คะน้าหมูกรอบ", price: 60, img: "https://i.pinimg.com/736x/b8/31/bc/b831bc54de20ea048ec5fb88172fd50b.jpg" }, { name: "แกงเขียวหวาน", price: 60, img: "https://i.pinimg.com/736x/a6/c6/84/a6c684eaed17152e3dbdac77e420c55f.jpg" }, { name: "ต้มจืดเต้าหู้", price: 50, img: "https://i.pinimg.com/736x/94/9d/b1/949db11fe9976f74d1031f00c7604b61.jpg" }];
        const drinks = [{ name: "ชาเย็น", price: 25, img: "https://i.pinimg.com/736x/0b/e7/b8/0be7b87d66b4d16ec60455d1d81abbe8.jpg" }, { name: "กาแฟเย็น", price: 30, img: "https://i.pinimg.com/736x/84/b7/35/84b7355734e0e662d3a9fa7ee641ceb5.jpg" }, { name: "น้ำส้ม", price: 25, img: "https://i.pinimg.com/736x/f8/56/5b/f8565b7442a9df396adc387c8555d8b4.jpg" }, { name: "น้ำแตงโมปั่น", price: 35, img: "https://i.pinimg.com/736x/fc/f9/75/fcf9755f4ac42ca6394adb0964d72d8e.jpg" }, { name: "ชามะนาว", price: 25, img: "https://i.pinimg.com/736x/e1/2a/be/e12abe1a7b170214203412397571c289.jpg" }, { name: "น้ำแดงโซดา", price: 25, img: "https://i.pinimg.com/736x/4f/7a/60/4f7a608bd5384c201a6d707b16263616.jpg" }, { name: "นมชมพู", price: 25, img: "https://i.pinimg.com/736x/49/e9/0c/49e90c3e7a08474e057912b5e5a6ce3e.jpg" }, { name: "โกโก้เย็น", price: 30, img: "https://i.pinimg.com/736x/2e/16/1d/2e161df2587bbcf1894ec24e579b8385.jpg" }, { name: "อัญชันมะนาว", price: 30, img: "https://i.pinimg.com/736x/85/ad/2e/85ad2ef9c98aaf765263fb3f0e74de61.jpg" }, { name: "น้ำเปล่า", price: 10, img: "https://i.pinimg.com/736x/81/68/b6/8168b6f71a64c4bd2dba556df2c053f0.jpg" }, { name: "ชาเขียวมัทฉะ", price: 35, img: "https://i.pinimg.com/736x/b2/8b/37/b28b37e9df9dba7a26cdedf4aa8ef781.jpg" }, { name: "น้ำลำไย", price: 30, img: "https://i.pinimg.com/736x/4c/91/19/4c9119ad1690c68057b538be0184ab5d.jpg" }];

        // สร้างรายการอาหารและเครื่องดื่ม
        foods.forEach(f => document.getElementById('contentFood').innerHTML += `<div class="bg-white rounded-2xl shadow-sm border p-2 flex flex-col"><img src="${f.img}" class="w-full aspect-video object-cover rounded-xl"><h2 class="font-bold text-sm mt-2">${f.name}</h2><p class="text-red-600 font-bold text-sm">${f.price} บาท</p><button onclick="openModal('${f.name}', ${f.price})" class="mt-auto bg-red-600 text-white w-full py-2 rounded-xl text-xs font-bold mt-2">สั่งเลย</button></div>`);
        drinks.forEach(d => document.getElementById('contentDrink').innerHTML += `<div class="bg-white rounded-2xl shadow-sm border p-2 flex flex-col"><img src="${d.img}" class="w-full aspect-video object-cover rounded-xl"><h2 class="font-bold text-sm mt-2">${d.name}</h2><p class="text-red-600 font-bold text-sm">${d.price} บาท</p><button onclick="openModal('${d.name}', ${d.price})" class="mt-auto bg-red-600 text-white w-full py-2 rounded-xl text-xs font-bold mt-2">สั่งเลย</button></div>`);

        // ฟังก์ชันจัดการระบบ
        function setName() {
            const name = document.getElementById('customerNameInput').value;
            if (name.trim() === "") { alert("กรุณากรอกชื่อก่อนครับ"); return; }
            customerName = name;
            document.getElementById('nameModal').classList.add('hidden');
            document.getElementById('orderStatus').innerText = `คุณ: ${customerName}`;
        }
        function changeName() { document.getElementById('nameModal').classList.remove('hidden'); }
        function openModal(n, p) { currentMenu = n; currentPrice = p; quantity = 1; document.getElementById('modalTitle').innerText = `${n} (${p} บ.)`; document.getElementById('qty').innerText = quantity; document.getElementById('orderModal').classList.remove('hidden'); }
        function changeQty(v) { quantity = Math.max(1, quantity + v); document.getElementById('qty').innerText = quantity; }
        function closeModal() { document.getElementById('orderModal').classList.add('hidden'); }
        
        function addToCart() { 
            // ดึงค่าระดับความเผ็ดที่เลือก
            const spicySelected = document.querySelector('input[name="spicy"]:checked');
            const spicy = spicySelected ? spicySelected.value : "";
            
            // ดึงค่าตัวเลือกพิเศษที่ติ๊ก (ถ้ามี)
            const extraSelected = document.querySelectorAll('input[name="extra"]:checked');
            let extras = [];
            let extraPrice = 0;
            extraSelected.forEach(el => {
                extras.push(el.value);
                if (el.value === "ไข่ดาว" || el.value === "ไข่เจียว") {
                    extraPrice += 10; // เพิ่มราคาตามเงื่อนไขพิเศษ
                }
            });

            const finalPrice = currentPrice + extraPrice;
            
            // รวมรายละเอียดหมายเหตุหรืออوبชันเสริม
            let noteText = spicy;
            if (extras.length > 0) {
                noteText += (noteText ? ", " : "") + extras.join(", ");
            }

            cart.push({ 
                name: currentMenu, 
                price: finalPrice, 
                qty: quantity, 
                note: noteText 
            }); 

            updateUI(); 
            closeModal(); 
        }

        function updateUI() { const total = cart.reduce((s, i) => s + i.qty, 0); document.getElementById('btnCheckout').innerText = `ดูตะกร้า (${total} จาน)`; }
        
        function toggleCart() { 
            let totalAll = 0; 
            document.getElementById('cartList').innerHTML = cart.map(i => { 
                totalAll += (i.price * i.qty); 
                return `<div class="text-sm border-b pb-2 flex justify-between"><div><b>${i.name} x${i.qty}</b><br><span class="text-xs text-gray-500">${i.note}</span></div> <span>${i.price * i.qty} บ.</span></div>`; 
            }).join('') + `<div class="text-right font-bold text-lg mt-2">รวม: ${totalAll} บาท</div>`; 
            document.getElementById('cartModal').classList.toggle('hidden'); 
        }

        function sendOrder() { if(customerName === "") { alert("กรุณาระบุชื่อก่อนครับ"); return; } socket.emit('new-order', { name: customerName, items: cart }); alert("ส่งออเดอร์แล้ว!"); cart = []; updateUI(); toggleCart(); }
        function switchTab(t) { document.getElementById('contentFood').classList.toggle('hidden', t !== 'food'); document.getElementById('contentDrink').classList.toggle('hidden', t !== 'drink'); document.getElementById('tabFood').className = t === 'food' ? "flex-1 bg-red-600 text-white py-2 rounded-lg font-bold" : "flex-1 text-gray-600 py-2 rounded-lg"; document.getElementById('tabDrink').className = t === 'drink' ? "flex-1 bg-red-600 text-white py-2 rounded-lg font-bold" : "flex-1 text-gray-600 py-2 rounded-lg"; }
    </script>
</body>
</html>
