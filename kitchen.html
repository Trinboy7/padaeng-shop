<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าจอห้องครัว - แซ่บเวอร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Sarabun', sans-serif; } 
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .animate-slide-in {
            animation: slideIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-red-950 min-h-screen text-white p-5 relative overflow-x-hidden">

    <!-- กล่องแจ้งเตือนมุมขวาบนเวลาลูกค้ายกเลิกออเดอร์ -->
    <div id="toastContainer" class="fixed top-5 right-5 z-[200] space-y-2"></div>

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">ออเดอร์ที่ต้องทำ</h1>
        <button onclick="toggleReceiptModal()" class="bg-amber-500 hover:bg-amber-600 px-6 py-2 rounded-full font-bold shadow-lg transition">ดูสรุปยอดขาย</button>
    </div>

    <div id="order-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <div id="receiptModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
        <div class="bg-white text-red-900 rounded-3xl p-6 w-full max-w-sm max-h-[80vh] overflow-y-auto">
            <h2 class="text-2xl font-bold mb-4 text-center">สรุปยอดขาย</h2>
            <div id="receiptList" class="space-y-4"></div>
            <button onclick="toggleReceiptModal()" class="mt-6 w-full py-3 bg-red-600 text-white rounded-xl font-bold">ปิด</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let receiptHistory = JSON.parse(localStorage.getItem('receiptHistory') || '[]');
        let activeOrders = {}; 

        // รับออเดอร์ใหม่จากลูกค้า
        socket.on('update-kitchen', (newOrder) => {
            const table = newOrder.name || "ไม่ระบุชื่อ"; 
            const orderKeyId = newOrder.id || table; 
            
            if (!activeOrders[orderKeyId]) activeOrders[orderKeyId] = { items: {}, table: table, id: newOrder.id };
            
            newOrder.items.forEach(item => {
                const key = item.name + (item.note || "");
                if (activeOrders[orderKeyId].items[key]) {
                    activeOrders[orderKeyId].items[key].qty += item.qty;
                } else {
                    activeOrders[orderKeyId].items[key] = { ...item };
                }
            });
            renderOrders();
        });

        // ดักฟังเหตุการณ์เมื่อลูกค้ายกเลิกออเดอร์
        socket.on('cancel-kitchen', (data) => {
            let found = false;
            for (let key in activeOrders) {
                if (activeOrders[key].id === data.orderId || activeOrders[key].table === data.name) {
                    delete activeOrders[key];
                    found = true;
                }
            }
            renderOrders();
            showToast(`⚠️ คุณ "${data.name}" ได้กดยกเลิกออเดอร์แล้ว!`);
        });

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = "bg-red-600 text-white px-5 py-3 rounded-2xl shadow-2xl font-bold text-sm border-2 border-white/20 animate-slide-in flex items-center gap-2";
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        function renderOrders() {
            const list = document.getElementById('order-list');
            list.innerHTML = "";
            const keys = Object.keys(activeOrders);
            
            if(keys.length === 0) {
                list.innerHTML = `<p class="col-span-full text-center text-red-300 italic">ไม่มีออเดอร์ในขณะนี้</p>`;
                return;
            }

            keys.forEach(orderKey => {
                const order = activeOrders[orderKey];
                let totalAmount = 0;
                
                const itemsHtml = Object.values(order.items).map(item => {
                    totalAmount += (item.price * item.qty);
                    return `
                        <li class="border-b py-2 text-sm">
                            <div class="flex justify-between font-bold">
                                <span>${item.name}</span>
                                <span>x${item.qty}</span>
                            </div>
                            ${item.note ? `<div class="text-xs text-red-600 mt-0.5">↳ (${item.note})</div>` : ''}
                        </li>
                    `;
                }).join('');

                const div = document.createElement('div');
                div.className = "bg-white text-red-900 p-6 rounded-2xl shadow-xl border-l-8 border-red-600";
                div.innerHTML = `
                    <h2 class="text-2xl font-bold mb-4">คุณ: ${order.table}</h2>
                    <ul class="mb-4">${itemsHtml}</ul>
                    <div class="bg-amber-100 p-3 rounded-lg text-center font-bold text-xl mb-4">รวม: ${totalAmount} บาท</div>
                    <button onclick="finishOrder('${orderKey}', ${totalAmount})" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-700 transition">เสิร์ฟแล้ว</button>
                `;
                list.appendChild(div);
            });
        }

        function finishOrder(orderKey, total) {
            const order = activeOrders[orderKey];
            const today = new Date().toLocaleDateString('th-TH');
            receiptHistory.push({ table: order.table, total, date: today, timestamp: Date.now() });
            localStorage.setItem('receiptHistory', JSON.stringify(receiptHistory));
            delete activeOrders[orderKey];
            renderOrders();
        }

        function deleteRecord(timestamp) {
            if(confirm('ยืนยันการลบรายการนี้?')) {
                receiptHistory = receiptHistory.filter(item => item.timestamp !== timestamp);
                localStorage.setItem('receiptHistory', JSON.stringify(receiptHistory));
                toggleReceiptModal();
                toggleReceiptModal();
            }
        }

        function toggleReceiptModal() {
            const modal = document.getElementById('receiptModal');
            const list = document.getElementById('receiptList');
            const grouped = receiptHistory.reduce((acc, curr) => {
                if (!acc[curr.date]) acc[curr.date] = [];
                acc[curr.date].push(curr);
                return acc;
            }, {});

            let html = '';
            for (const date in grouped) {
                let dailyTotal = 0;
                html += `<h3 class="font-bold text-lg bg-gray-100 p-2 rounded mt-2">วันที่: ${date}</h3>`;
                grouped[date].forEach(item => {
                    dailyTotal += item.total;
                    html += `
                        <div class="flex justify-between items-center py-1 border-b text-sm">
                            <span>${item.table} (${item.total} บาท)</span>
                            <button onclick="deleteRecord(${item.timestamp})" class="text-red-500 font-bold">ลบ</button>
                        </div>
                    `;
                });
                html += `<div class="text-right font-bold text-red-600 mt-1 mb-3">รวมวัน: ${dailyTotal} บาท</div>`;
            }
            list.innerHTML = html || '<p class="text-center text-gray-400">ยังไม่มีประวัติการขาย</p>';
            modal.classList.toggle('hidden');
        }
    </script>
</body>
</html>
