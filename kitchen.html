<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ห้องครัว - ร้านป้าแดง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-red-950 min-h-screen text-white p-5">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">หน้าจอห้องครัว</h1>
        <div class="flex gap-2">
            <a href="admin.html" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-full font-bold shadow-lg">จัดการเมนู/สต็อก</a>
            <button onclick="toggleReceiptModal()" class="bg-amber-500 hover:bg-amber-600 px-6 py-2 rounded-full font-bold shadow-lg">สรุปยอดขาย</button>
        </div>
    </div>

    <div id="order-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <div id="receiptModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
        <div class="bg-white text-red-900 rounded-3xl p-6 w-full max-w-sm max-h-[80vh] overflow-y-auto">
            <h2 class="text-2xl font-bold mb-4 text-center">สรุปยอดขาย</h2>
            <div id="receiptList" class="space-y-4"></div>
            <button onclick="toggleReceiptModal()" class="mt-6 w-full py-3 bg-red-600 text-white rounded-xl font-bold">ปิด</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let receiptHistory = JSON.parse(localStorage.getItem('receiptHistory') || '[]');
        let activeOrders = {}; 

        socket.on('update-kitchen', (newOrder) => {
            activeOrders[newOrder.id] = newOrder;
            renderOrders();
        });

        socket.on('cancel-kitchen', (data) => {
            delete activeOrders[data.orderId];
            renderOrders();
        });

        function updateStatus(id, newStatus) {
            if(activeOrders[id]) {
                activeOrders[id].status = newStatus;
                socket.emit('update-status', { orderId: id, status: newStatus });
                renderOrders();
            }
        }

        function renderOrders() {
            const list = document.getElementById('order-list');
            list.innerHTML = "";
            const keys = Object.keys(activeOrders);
            if(keys.length === 0) { list.innerHTML = `<p class="col-span-full text-center text-red-300 italic">ไม่มีออเดอร์</p>`; return; }

            keys.forEach(id => {
                const order = activeOrders[id];
                let total = 0;
                const items = order.items.map(i => {
                    total += (i.price * i.qty);
                    return `<li class="border-b py-2 text-sm"><div class="flex justify-between font-bold"><span>${i.name}</span><span>x${i.qty}</span></div>${i.note ? `<div class="text-xs text-red-600">↳ (${i.note})</div>`:''}</li>`;
                }).join('');

                let nextBtn = '';
                if(order.status === 'รอดำเนินการ') {
                    nextBtn = `<button onclick="updateStatus('${id}', 'กำลังทำอาหาร')" class="w-full bg-amber-500 text-white font-bold py-2 rounded-xl mb-2">รับออเดอร์ / กำลังทำ</button>`;
                } else if(order.status === 'กำลังทำอาหาร') {
                    nextBtn = `<button onclick="finishOrder('${id}', ${total})" class="w-full bg-green-600 text-white font-bold py-2 rounded-xl mb-2">เสิร์ฟแล้ว</button>`;
                }

                div = document.createElement('div');
                div.className = "bg-white text-red-900 p-6 rounded-2xl shadow-xl border-l-8 border-red-600";
                div.innerHTML = `<h2 class="text-xl font-bold mb-2">${order.table} (${order.name})</h2>
                    <p class="text-xs text-gray-500 mb-2">สถานะ: <b class="text-red-600">${order.status}</b></p>
                    <ul class="mb-4">${items}</ul>
                    <div class="bg-amber-100 p-2 rounded-lg text-center font-bold text-lg mb-3">รวม: ${total} บาท</div>
                    ${nextBtn}`;
                list.appendChild(div);
            });
        }

        function finishOrder(id, total) {
            const order = activeOrders[id];
            socket.emit('update-status', { orderId: id, status: 'เสิร์ฟแล้ว' });
            receiptHistory.push({ table: order.table, name: order.name, items: order.items, total, date: new Date().toLocaleDateString('th-TH'), timestamp: Date.now() });
            localStorage.setItem('receiptHistory', JSON.stringify(receiptHistory));
            delete activeOrders[id];
            renderOrders();
        }

        function toggleReceiptModal() {
            const modal = document.getElementById('receiptModal');
            const list = document.getElementById('receiptList');
            let totalAll = 0;
            let html = receiptHistory.map(h => {
                totalAll += h.total;
                return `<div class="border-b pb-2 text-sm"><b class="text-red-600">${h.table} (${h.name})</b> - ${h.total} บาท <br><span class="text-xs text-gray-500">${h.date}</span></div>`;
            }).join('');
            list.innerHTML = html ? `<div class="font-bold text-lg mb-2 text-red-700">ยอดขายรวมทั้งหมด: ${totalAll} บาท</div>` + html : '<p class="text-center text-gray-400">ยังไม่มีประวัติ</p>';
            modal.classList.toggle('hidden');
        }
    </script>
</body>
</html>
