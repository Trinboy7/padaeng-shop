<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ห้องครัว - ร้านป้าแดง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body id="kitchenBody" class="bg-red-950 min-h-screen text-white p-5 transition-colors duration-300">
    <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
        <div>
            <h1 class="text-3xl font-bold">หน้าจอห้องครัว</h1>
            <p id="currentDateDisplay" class="text-amber-300 text-sm mt-1"></p>
        </div>
        <div class="flex gap-2 flex-wrap items-center">
            <button onclick="toggleDarkMode()" id="darkModeBtn" class="bg-gray-800 text-amber-400 px-4 py-2 rounded-full font-bold shadow-lg border border-amber-400 transition">🌙 โหมดมืด</button>
            <button onclick="resetAllData()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-full font-bold shadow-lg transition">🗑️ ล้างข้อมูลทั้งหมด</button>
            <a href="admin.html" class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-full font-bold shadow-lg transition">จัดการเมนู/สต็อก</a>
            <button onclick="toggleReceiptModal()" class="bg-amber-500 hover:bg-amber-600 px-5 py-2 rounded-full font-bold shadow-lg transition">สรุปยอดขาย</button>
        </div>
    </div>

    <div id="order-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <!-- Modal สรุปยอดขาย -->
    <div id="receiptModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
        <div class="bg-white text-red-900 rounded-3xl p-6 w-full max-w-md max-h-[85vh] overflow-y-auto shadow-2xl">
            <h2 id="modalHeaderTitle" class="text-2xl font-bold mb-4 text-center">📅 เลือกวันที่ต้องการดูยอดขาย</h2>
            <div id="receiptContent" class="space-y-3"></div>
            <button onclick="closeReceiptModal()" class="mt-6 w-full py-3 bg-red-600 text-white rounded-xl font-bold hover:bg-red-700 transition">ปิด</button>
        </div>
    </div>

    <audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ตั้งค่าเชื่อมต่อ Supabase
        const SUPABASE_URL = 'https://krvynzzupojvyoyhzrz.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_LwvLAs1QkK46D_4F30V43Q_j40I2uQ7';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const socket = io();
        let activeOrders = {}; 

        const todayDateStr = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'numeric', day: 'numeric' });
        document.getElementById('currentDateDisplay').innerText = `📅 วันที่ปัจจุบัน: ${todayDateStr}`;

        socket.on('update-kitchen', (newOrder) => {
            activeOrders[newOrder.id] = newOrder;
            playAlertSound();
            renderOrders();
        });

        socket.on('cancel-kitchen', (data) => {
            delete activeOrders[data.orderId];
            renderOrders();
        });

        function playAlertSound() {
            const sound = document.getElementById('alertSound');
            sound.play().catch(e => console.log("Audio play restricted", e));
        }

        function updateStatus(id, newStatus) {
            if(activeOrders[id]) {
                activeOrders[id].status = newStatus;
                socket.emit('update-status', { orderId: id, status: newStatus });
                renderOrders();
            }
        }

        function renderOrders() {
            const list = document.getElementById('order-list');
            list.innerHTML = "";
            const keys = Object.keys(activeOrders);
            if(keys.length === 0) { list.innerHTML = `<p class="col-span-full text-center text-red-300 italic">ไม่มีออเดอร์ในขณะนี้</p>`; return; }

            keys.forEach(id => {
                const order = activeOrders[id];
                let total = 0;
                const items = order.items.map(i => {
                    total += (i.price * i.qty);
                    return `<li class="border-b py-2 text-sm"><div class="flex justify-between font-bold"><span>${i.name}</span><span>x${i.qty}</span></div>${i.note ? `<div class="text-xs text-red-600">↳ (${i.note})</div>`:''}</li>`;
                }).join('');

                let nextBtn = '';
                if(order.status === 'รอดำเนินการ') {
                    nextBtn = `<button onclick="updateStatus('${id}', 'กำลังทำอาหาร')" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 rounded-xl mb-2 transition">รับออเดอร์ / กำลังทำ</button>`;
                } else if(order.status === 'กำลังทำอาหาร') {
                    nextBtn = `<button onclick="finishOrder('${id}', ${total})" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-xl mb-2 transition">เสิร์ฟแล้ว (บันทึกยอดขาย)</button>`;
                }

                let div = document.createElement('div');
                div.className = "bg-white text-red-900 p-6 rounded-2xl shadow-xl border-l-8 border-red-600";
                div.innerHTML = `<h2 class="text-xl font-bold mb-2">${order.table} (${order.name})</h2>
                    <p class="text-xs text-gray-500 mb-2">สถานะ: <b class="text-red-600">${order.status}</b></p>
                    <ul class="mb-4">${items}</ul>
                    <div class="bg-amber-100 p-2 rounded-lg text-center font-bold text-lg mb-3">รวม: ${total} บาท</div>
                    ${nextBtn}`;
                list.appendChild(div);
            });
        }

        // บันทึกออเดอร์ที่เสิร์ฟแล้วลง Supabase Cloud
        async function finishOrder(id, total) {
            const order = activeOrders[id];
            socket.emit('update-status', { orderId: id, status: 'เสิร์ฟแล้ว' });
            
            const { error } = await supabase
                .from('orders')
                .insert([{
                    order_id: order.id,
                    table_name: order.table,
                    customer_name: order.name,
                    items: order.items,
                    total: total,
                    sale_date: todayDateStr
                }]);

            if (error) {
                console.error("บันทึกข้อมูลลง Supabase ไม่สำเร็จ:", error);
                alert("เกิดข้อผิดพลาดในการบันทึกข้อมูลลง Cloud");
            } else {
                console.log("บันทึกยอดขายลง Supabase สำเร็จ!");
            }

            delete activeOrders[id];
            renderOrders();
        }

        function resetAllData() {
            if(confirm("⚠️ คุณต้องการล้างข้อมูลออเดอร์ในหน้าจอทั้งหมดใช่หรือไม่?")) {
                activeOrders = {};
                renderOrders();
                alert("ล้างหน้าจอเรียบร้อยแล้วครับ!");
            }
        }

        let isDarkMode = false;
        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            const body = document.getElementById('kitchenBody');
            const btn = document.getElementById('darkModeBtn');
            if(isDarkMode) {
                body.className = "bg-gray-900 min-h-screen text-white p-5 transition-colors duration-300";
                btn.innerText = "☀️ โหมดสว่าง";
            } else {
                body.className = "bg-red-950 min-h-screen text-white p-5 transition-colors duration-300";
                btn.innerText = "🌙 โหมดมืด";
            }
        }

        async function deleteRecord(rowId, targetDate) {
            if(confirm('คุณต้องการลบประวัติรายการนี้ใช่หรือไม่?')) {
                const { error } = await supabase
                    .from('orders')
                    .delete()
                    .eq('id', rowId);

                if (error) {
                    console.error("ลบข้อมูลไม่สำเร็จ:", error);
                } else {
                    showDayDetail(targetDate);
                }
            }
        }

        function toggleReceiptModal() { showDateList(); document.getElementById('receiptModal').classList.remove('hidden'); }
        function closeReceiptModal() { document.getElementById('receiptModal').classList.add('hidden'); }

        async function showDateList() {
            document.getElementById('modalHeaderTitle').innerText = "📅 เลือกวันที่ต้องการดูยอดขาย";
            const content = document.getElementById('receiptContent');

            const { data: receiptHistory, error } = await supabase
                .from('orders')
                .select('*')
                .order('created_at', { ascending: false });

            if (error || !receiptHistory || receiptHistory.length === 0) {
                content.innerHTML = '<p class="text-center text-gray-400 py-4">ยังไม่มีประวัติการขายบน Cloud</p>';
                return;
            }

            const grouped = receiptHistory.reduce((acc, curr) => {
                if (!acc[curr.sale_date]) acc[curr.sale_date] = [];
                acc[curr.sale_date].push(curr);
                return acc;
            }, {});

            let html = '';
            for (const date in grouped) {
                let dailyTotal = grouped[date].reduce((sum, item) => sum + Number(item.total), 0);
                let isToday = (date === todayDateStr);

                html += `
                    <button onclick="showDayDetail('${date}')" class="w-full flex justify-between items-center p-4 rounded-2xl border-2 ${isToday ? 'border-red-500 bg-red-50 text-red-900' : 'border-gray-200 bg-gray-50 text-gray-800'} hover:shadow-md transition font-bold">
                        <span>📅 วันที่ ${date} ${isToday ? '(วันนี้)' : ''}</span>
                        <span class="text-red-600">${dailyTotal} บาท ➔</span>
                    </button>
                `;
            }
            content.innerHTML = html;
        }

        async function showDayDetail(date) {
            document.getElementById('modalHeaderTitle').innerText = `📊 ยอดขายวันที่ ${date}`;
            const content = document.getElementById('receiptContent');

            const { data: receiptHistory, error } = await supabase
                .from('orders')
                .select('*')
                .eq('sale_date', date)
                .order('created_at', { ascending: false });

            if (error || !receiptHistory) {
                content.innerHTML = '<p class="text-center text-red-500">เกิดข้อผิดพลาดในการดึงข้อมูล</p>';
                return;
            }

            let dailyTotal = receiptHistory.reduce((sum, item) => sum + Number(item.total), 0);

            let html = `<button onclick="showDateList()" class="text-sm font-bold text-blue-600 hover:underline mb-3">⬅️ กลับไปเลือกวัน</button>`;
            html += `<div class="bg-amber-100 p-3 rounded-2xl text-center font-bold text-lg text-amber-900 mb-3">💰 ยอดขายรวม: ${dailyTotal} บาท</div>`;
            
            html += `<div class="space-y-2 max-h-[50vh] overflow-y-auto pr-1">`;
            receiptHistory.forEach(item => {
                let itemsSummary = item.items.map(i => `${i.name} x${i.qty}`).join(', ');
                html += `
                    <div class="flex justify-between items-center p-3 border border-gray-200 rounded-xl bg-gray-50 text-sm text-gray-800">
                        <div>
                            <span class="font-bold">${item.table_name} (${item.customer_name})</span><br>
                            <span class="text-xs text-gray-500">${itemsSummary}</span>
                        </div>
                        <div class="text-right">
                            <span class="font-bold text-red-600">${item.total} บ.</span><br>
                            <button onclick="deleteRecord(${item.id}, '${date}')" class="text-xs text-red-400 hover:text-red-600 underline">ลบ</button>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;

            content.innerHTML = html;
        }
    </script>
</body>
</html>
