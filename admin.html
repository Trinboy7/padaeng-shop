<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>จัดการสต็อกเมนู - ร้านป้าแดง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    <div class="max-w-xl mx-auto bg-white rounded-3xl p-6 shadow-xl">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">จัดการวัตถุดิบ / ปิดเมนูหมด</h1>
            <a href="kitchen.html" class="bg-gray-500 text-white px-4 py-2 rounded-xl text-sm font-bold">กลับหน้าครัว</a>
        </div>
        <p class="text-sm text-gray-500 mb-4">คลิกที่ปุ่มเพื่อเปิด/ปิดเมนู (ถ้าเมนูไหนหมด ลูกค้าจะไม่สามารถกดสั่งได้ทันที)</p>
        <div id="adminMenuList" class="space-y-3"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let soldOutMenus = {};

        const allMenus = [
            "กะเพราหมู", "ข้าวผัดหมู", "ข้าวผัดกุ้ง", "หมูกระเทียม", "ต้มยำกุ้ง", 
            "ไข่เจียวหมูสับ", "ผัดผักบุ้ง", "ลาบหมู", "ผัดพริกแกง", "คะน้าหมูกรอบ", 
            "แกงเขียวหวาน", "ต้มจืดเต้าหู้", "ชาเย็น", "กาแฟเย็น", "น้ำส้ม", 
            "น้ำแตงโมปั่น", "ชามะนาว", "น้ำแดงโซดา", "นมชมพู", "โกโก้เย็น", 
            "อัญชันมะนาว", "น้ำเปล่า", "ชาเขียวมัทฉะ", "น้ำลำไย"
        ];

        socket.on('init-soldout', (data) => {
            soldOutMenus = data;
            renderAdminMenu();
        });

        function renderAdminMenu() {
            const list = document.getElementById('adminMenuList');
            list.innerHTML = allMenus.map(m => {
                let isSold = soldOutMenus[m];
                return `<div class="flex justify-between items-center p-3 border rounded-2xl bg-gray-50">
                    <span class="font-bold text-gray-700">${m}</span>
                    <button onclick="toggleMenu('${m}')" class="px-4 py-2 rounded-xl font-bold text-sm ${isSold ? 'bg-red-600 text-white' : 'bg-green-600 text-white'}">
                        ${isSold ? 'สินค้าหมด (ปิด)' : 'มีสินค้า (เปิด)'}
                    </button>
                </div>`;
            }).join('');
        }

        function toggleMenu(name) {
            socket.emit('toggle-soldout', name);
        }
    </script>
</body>
</html>
